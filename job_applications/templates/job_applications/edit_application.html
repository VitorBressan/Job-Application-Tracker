{% load bootstrap5 %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Application</title>
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8"> <!-- Limits the width so it looks professional -->
                <div class="card shadow border-0 p-4 p-md-5">
                    <div class="mb-4">
                        <h2 class="fw-bold text-dark">Edit Application</h2>
                        <p class="text-muted">Update the details for your job application.</p>
                    </div>

                    {% load crispy_forms_tags %}
                    {% crispy form %}
                
                </div>
            </div>
        </div>
    </div>
</body>
</html>
